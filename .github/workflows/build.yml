name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            arch: arm64
            build-cmd: npm run build:mac
            suffix: mac-arm64.dmg

          - os: windows-2025
            arch: x64
            build-cmd: npm run build:win
            suffix: win-x64.exe

          - os: ubuntu-24.04
            arch: x64
            build-cmd: npm run build:linux
            suffix: linux-x64.AppImage

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      # 把 package.json 的版本号对齐到 git tag（如 v1.0.3 → "1.0.3"）
      # 用 node 内联脚本代替 npm version，避免 Windows 兼容问题
      - name: Sync version from tag
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "Setting version to $TAG_VERSION"
          node -e "const p=require('./package.json');p.version='${TAG_VERSION}';require('fs').writeFileSync('package.json',JSON.stringify(p,null,2)+'\n')"

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-xcb-dev libxcb-dri3-dev libxcb-util-dev \
            libxcb-cursor-dev libxcb-keysyms1-dev libxcb-xkb-dev \
            libxkbfile-dev libxkbcommon-dev libxkbcommon-x11-dev

      - run: npm ci

      - name: Vite build
        run: npx vite build
        env:
          NODE_ENV: production

      - name: Package
        run: ${{ matrix.build-cmd }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: douyin-insight-${{ matrix.suffix }}
          path: release/

  release:
    needs: build
    runs-on: ubuntu-24.04
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          REPO="${{ github.repository }}"

          gh release view "$TAG" --repo "$REPO" &>/dev/null || \
            gh release create "$TAG" --repo "$REPO" --generate-notes

          # 只上传最终安装包（命名统一为 douyin-insight-x.y.z-platform.arch.ext）
          #   Mac: .dmg
          #   Windows: douyin-insight-*.exe（排除 elevate/notifu/snoretoast 等辅助工具）
          #   Linux: .AppImage
          find artifacts -type f \( \
            -name '*.dmg' -o \
            \( -name 'douyin-insight-*.exe' ! -name '*elevate*' ! -name '*notifu*' ! -name '*snoretoast*' \) -o \
            -name '*.AppImage' \
          \) | while read -r f; do
            echo "Uploading: $(basename "$f")"
            gh release upload "$TAG" "$f" --repo "$REPO" --clobber
          done
