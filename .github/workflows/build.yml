name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            arch: arm64
            build-cmd: npm run build:mac
            suffix: mac-arm64.dmg

          - os: windows-2025
            arch: x64
            build-cmd: npm run build:win
            suffix: win-x64.exe

          - os: ubuntu-24.04
            arch: x64
            build-cmd: npm run build:linux
            suffix: linux-x64.AppImage

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-xcb-dev libxcb-dri3-dev libxcb-util-dev \
            libxcb-cursor-dev libxcb-keysyms1-dev libxcb-xkb-dev \
            libxkbfile-dev libxkbcommon-dev libxkbcommon-x11-dev

      - run: npm ci

      - name: Vite build
        run: npx vite build
        env:
          NODE_ENV: production

      - name: Package
        run: ${{ matrix.build-cmd }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: douyin-insight-${{ matrix.suffix }}
          path: release/

  release:
    needs: build
    runs-on: ubuntu-24.04
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten and upload
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          REPO="${{ github.repository }}"

          # 先把 Release 建好（如果不存在）
          gh release view "$TAG" --repo "$REPO" &>/dev/null || \
            gh release create "$TAG" --repo "$REPO" --generate-notes

          # 只传安装包，不上传 Electron 内部文件（*.pak / app.asar / chrome-sandbox 等）
          find artifacts -type f \( -name '*.dmg' -o -name '*.exe' -o -name '*.AppImage' \) | while read -r f; do
            echo "Uploading: $(basename "$f")"
            gh release upload "$TAG" "$f" --repo "$REPO" --clobber
          done
